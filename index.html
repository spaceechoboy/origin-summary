<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LGNS Summary</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e14">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LGNS Summary">
<style>
:root{--bg:#0a0e14;--panel:#131822;--row:#1a2030;--fg:#c9d1d9;--dim:#8b949e;
--grn:#3fb950;--yel:#d29922;--blue:#58a6ff;--pur:#bc8cff;--poly:#EB4323;--anu:#9FE870;--bd:#30363d}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Menlo,sans-serif;font-size:14px;line-height:1.5}
.wrap{max-width:940px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px}
h1{font-size:18px;margin:0;color:var(--blue)} .status{font-size:11px;color:var(--dim);text-align:right;font-variant-numeric:tabular-nums}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{background:var(--panel);border:1px solid var(--bd);color:var(--dim);border-radius:7px;padding:7px 14px;cursor:pointer;font-size:13px}
.tab.on{color:var(--blue);border-color:var(--blue)}
.sum{background:#0f1420;border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:12px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.big{font-size:32px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums}
.big .u{font-size:13px;color:var(--dim);font-weight:500;margin-left:6px}
.meta{font-size:11px;color:var(--dim);margin-top:6px} .red{margin-top:12px;font-size:13px} .red b{color:var(--grn)}
.lgd{margin-top:10px;font-size:12px} .li{display:flex;align-items:center;gap:8px;padding:3px 0}
.sw{width:11px;height:11px;border-radius:3px;flex:none} .li .nm{flex:1} .li .pc{color:var(--dim);width:48px;text-align:right}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 16px}
.chip{background:var(--panel);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;font-size:12px;cursor:pointer}
.chip:hover{border-color:var(--blue)} .chip b{font-variant-numeric:tabular-nums} .chip .s{font-size:10px;color:var(--dim);display:block;margin-top:2px}
.chain{border:1px solid var(--bd);border-radius:10px;margin-bottom:12px;overflow:hidden}
.chead{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--bd)}
.chead .nm{font-size:14px;font-weight:700} .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px}
.chead .ct{font-size:11px;color:var(--dim)}
.chsum{display:flex;flex-wrap:wrap;gap:16px;padding:8px 14px;background:#0f1420;font-size:12px}
.chsum span{color:var(--dim)} .chsum b{font-variant-numeric:tabular-nums}
table.m{width:100%;border-collapse:collapse;font-size:12px}
table.m th{font-size:10px;text-transform:uppercase;color:var(--dim);text-align:right;padding:7px 10px;border-bottom:1px solid var(--bd)}
table.m th:first-child{text-align:left} table.m td{padding:6px 10px;border-bottom:1px solid #1c2230;text-align:right;font-variant-numeric:tabular-nums}
table.m td:first-child{text-align:left} table.m tfoot td{border-top:1px solid var(--bd);font-weight:700;padding-top:8px}
.cnt{display:inline-block;min-width:20px;padding:1px 6px;background:var(--row);border-radius:9px;color:var(--dim);font-size:11px}
.grn{color:var(--grn)}.yel{color:var(--yel)}.pur{color:var(--pur)}.usd{color:var(--blue)}.dim{color:#6b7280}.rate{color:#7ee787;font-size:11px}
.back{color:var(--blue);cursor:pointer;font-size:12px;margin-bottom:10px;display:inline-block}
.empty{color:var(--dim);text-align:center;padding:28px;background:var(--panel);border:1px dashed var(--bd);border-radius:8px}
details.aw{background:var(--panel);border:1px solid var(--bd);border-radius:8px;margin:14px 0}
details.aw summary{padding:12px 16px;cursor:pointer;color:var(--blue);font-size:13px}
.awb{padding:0 16px 14px} .aw-form{display:flex;gap:8px;flex-wrap:wrap}
.aw-form input{background:var(--bg);color:var(--fg);border:1px solid var(--bd);border-radius:5px;padding:9px 11px;font-size:12px;font-family:Menlo,monospace;flex:1 1 200px}
.aw-form button,.dz{background:var(--blue);color:#06121f;border:none;border-radius:5px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:12px}
.dz{background:none;border:1px solid var(--yel);color:var(--yel)} .aw-warn{font-size:11px;color:var(--yel);margin-bottom:8px}
footer{color:var(--dim);font-size:10px;text-align:center;margin-top:24px}
#installHint{position:fixed;left:0;right:0;bottom:0;background:#131822;border-top:1px solid var(--bd);color:var(--fg);font-size:12px;padding:10px 14px calc(10px + env(safe-area-inset-bottom)) 14px;display:flex;gap:10px;align-items:center;z-index:50}
#installHint b{color:var(--blue)} #installHint span{flex:1;line-height:1.45}
#installHint button{background:none;border:1px solid var(--bd);color:var(--dim);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;flex:none}
</style></head><body><div class="wrap">
<header><h1>LGNS Summary</h1><div style="text-align:right"><button id="rescan" onclick="rescan()" style="background:none;border:1px solid #30363d;color:#8b949e;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer">↻ 즉시 스캔</button><div id="status" class="status" style="margin-top:4px">로딩…</div></div></header>
<div class="tabs"><div id="tab-sum" class="tab on" onclick="go(null)">요약</div><div id="tab-det" class="tab" onclick="go(_sel)">지갑 상세</div></div>
<div id="view"></div>
<details class="aw"><summary>+ 지갑 추가</summary><div class="awb">
<div class="aw-warn">⛔ PRIVATE KEY 금지 · 주소(0x+40hex)만 · 이 브라우저에만 저장(전송 없음)</div>
<div class="aw-form"><input id="aw-addr" placeholder="0x… 주소" autocomplete="off"><input id="aw-name" placeholder="이름(선택)"><button onclick="addW()">추가</button></div>
<div id="aw-msg" style="font-size:12px;margin-top:8px"></div>
<div style="margin-top:12px"><button class="dz" onclick="clearW()">전체 등록 해제(이 브라우저)</button></div>
</div></details>
<footer>READ-ONLY · 주소는 이 브라우저에만 저장 · no private keys · no transactions · SpaceEchoBoy</footer>
</div>
<script type="module" src="app.js"></script>
</body></html>
